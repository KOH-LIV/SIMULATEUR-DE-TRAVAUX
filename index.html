// ─── UTILITAIRES GLOBAUX ────────────────────────────────────────────────────
const fmt = n => n ? Math.round(n).toLocaleString("fr-FR") + " €" : "0 €";
const fmtDate = s => { try { return new Date(s).toLocaleDateString("fr-FR"); } catch { return s || ""; } };
const arrVal = a => Array.isArray(a) && a.length ? a.join(", ") : "—";
const orDash = v => v || "—";

// Clé unique d'un poste
const KEY = p => `${p.piece}|${p.poste}|${p.fourniture}`;

// Calcul d'une ligne (fournitures + MO) × quantité × nb pièces
const calcLigne = (p, qty, ov, nbP, effParams) => {
  const ep = effParams.find(x => x.id === p.id) || p;
  const q = parseFloat(qty[KEY(p)] ?? 0) || 0;
  const nbRaw = nbP?.[p.piece];
  const nb = (nbRaw === undefined || nbRaw === "") ? 1 : (parseFloat(nbRaw) || 0);
  if (!q || !nb || p.methode === "%") return { f: 0, mo: 0, nb, q };
  return {
    f: (parseFloat(ep.coutHT) || 0) * q * nb,
    mo: (parseFloat(ep.moHT) || 0) * q * nb,
    nb, q
  };
};

// Calcul global des totaux
const calcTotaux = (params, qty, ov, nbP, effParams) => {
  let tF = 0, tMO = 0;
  params.forEach(p => {
    const r = calcLigne(p, qty, ov, nbP, effParams);
    tF += r.f; tMO += r.mo;
  });
  const base = tF + tMO;
  const moePct = (parseFloat(effParams.find(p => p.fourniture === "Honoraires MOE (%)")?.coutHT ?? 10)) / 100;
  const impPct = (parseFloat(effParams.find(p => p.fourniture === "Imprévus (%)")?.coutHT ?? 15)) / 100;
  const moe = base * moePct;
  return { tF, tMO, base, moe, normal: base + moe, haut: (base + moe) * (1 + impPct), moePct, impPct };
};

                      : <SinglePills options={opts} value={fiche[tk]} onChange={v=>uf(tk,v)}/>
                    }
                  </div>
                </Field>
                <Field label={`État ${l.toLowerCase()}`}>
                  <RatingPills value={fiche[ek]} onChange={v=>uf(ek,v)}/>
                </Field>
              </div>
            ))}
          </div>

}

// ─── ONGLET TRAVAUX ─────────────────────────────────────────────────────────
function TravauxTab({ params, pList, qty, setQty, ov, setOv, nbP, setNbP, effParams, totaux }) {
  const [open, setOpen] = React.useState(null);

  const pieceTotaux = React.useMemo(() => {
    const m = {};
    params.forEach(p => {
      const r = calcLigne(p, qty, ov, nbP, effParams);
      m[p.piece] = (m[p.piece] || 0) + r.f + r.mo;
    });
    return m;
  }, [params, qty, ov, nbP, effParams]);

  return (
    <div>
      {/* Barre totaux */}
      <div style={{ background:"#1d4a6e", borderRadius:12, padding:"12px 18px", marginBottom:12, display:"flex", gap:20, alignItems:"center", flexWrap:"wrap" }}>
        <div>
          <div style={{ fontSize:11, color:"rgba(255,255,255,.7)" }}>Estimation normale</div>
          <div style={{ fontSize:22, fontWeight:800, color:"#fff" }}>{fmt(totaux.normal)}</div>
        </div>
        <div style={{ background:"rgba(255,255,255,.2)", width:1, height:36 }}/>
        <div>
          <div style={{ fontSize:11, color:"rgba(255,255,255,.7)" }}>Estimation haute (+{Math.round(totaux.impPct*100)}%)</div>
          <div style={{ fontSize:22, fontWeight:800, color:"#fde68a" }}>{fmt(totaux.haut)}</div>
        </div>
      </div>

      {PIECES_ORDRE.filter(pn => pList[pn]).map(pn => {
        const isOpen = open === pn;
        const postes = pList[pn];
        const total = pieceTotaux[pn] || 0;

        return (
          <div key={pn} style={{ background:"#fff", borderRadius:12, border:"1px solid #e2e8f0", marginBottom:8, overflow:"hidden" }}>
            {/* Header pièce */}
            <div onClick={() => setOpen(isOpen ? null : pn)}
              style={{ padding:"12px 18px", cursor:"pointer", display:"flex", alignItems:"center", gap:10, background:isOpen?"#eff6ff":"#fff", userSelect:"none" }}>
              <span style={{ fontSize:18 }}>{PIECES_ICONES[pn] || "📦"}</span>
              <span style={{ fontWeight:600, fontSize:14, flex:1 }}>{pn}</span>
              {/* Nb de pièces */}
              <div onClick={e => e.stopPropagation()}
                style={{ display:"flex", alignItems:"center", gap:6, background:"#fff", border:"1px solid #e2e8f0", borderRadius:8, padding:"3px 10px" }}>
                <span style={{ fontSize:11, color:"#64748b", whiteSpace:"nowrap" }}>Nb de pièces</span>
                <input type="number" min="0" value={nbP[pn] ?? ""} placeholder="1"
                  onChange={e => setNbP(pn, e.target.value)}
                  style={{ width:48, border:"none", outline:"none", fontSize:15, fontWeight:700, color:"#1d4ed8", textAlign:"center", background:"transparent", touchAction:"manipulation" }}
                />
              </div>
              {total > 0 && <span style={{ fontSize:13, fontWeight:700, color:"#1d4ed8" }}>{fmt(total)}</span>}
              <span style={{ color:"#94a3b8", fontSize:13 }}>{isOpen ? "▲" : "▼"}</span>
            </div>

            {isOpen && (
              <div style={{ padding:"0 18px 14px" }}>
                {Object.entries(postes).map(([poste, lignes]) => (
                  <div key={poste}>
                    <div style={{ fontSize:10, fontWeight:700, textTransform:"uppercase", color:"#94a3b8", margin:"10px 0 6px", paddingTop:10, borderTop:"1px solid #f1f5f9" }}>{poste}</div>

// ─── ONGLET RÉSULTATS ────────────────────────────────────────────────────────
function ResultatsTab({ params, qty, ov, nbP, effParams, totaux, fiche, onSave, onExportCSV, onExportPDF }) {
  const actives = React.useMemo(() =>
    params.filter(p => {
      const r = calcLigne(p, qty, ov, nbP, effParams);
      return (r.f + r.mo) > 0;
    }),
    [params, qty, ov, nbP, effParams]
  );

  const byPiece = React.useMemo(() => {
    const m = {};
    actives.forEach(p => { if (!m[p.piece]) m[p.piece] = []; m[p.piece].push(p); });
    return m;
  }, [actives]);

  // ─── Calcul prix/m² ───────────────────────────────────────────────────
  const surfCarrez = parseFloat(fiche.surfCarrez) || 0;
  const prixParM2 = surfCarrez > 0 ? Math.round(totaux.normal / surfCarrez) : null;

  return (
    <div>
      {/* Totaux */}
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:12, marginBottom:12 }}>
        <div style={{ background:"linear-gradient(135deg,#059669,#10b981)", borderRadius:14, padding:"18px 22px", color:"#fff" }}>
          <div style={{ fontSize:11, opacity:.8, marginBottom:4 }}>💰 Prix / m²</div>
          <div style={{ fontSize:26, fontWeight:800 }}>
            {prixParM2 ? `${prixParM2.toLocaleString("fr-FR")} €` : "—"}
          </div>
          <div style={{ fontSize:11, opacity:.7, marginTop:4 }}>
            {surfCarrez > 0 ? `Surface : ${surfCarrez} m²` : "Surface non saisie"}
          </div>
        </div>
        <div style={{ background:"linear-gradient(135deg,#1d4ed8,#3b82f6)", borderRadius:14, padding:"18px 22px", color:"#fff" }}>
          <div style={{ fontSize:11, opacity:.8, marginBottom:4 }}>✓ Estimation normale</div>
          <div style={{ fontSize:26, fontWeight:800 }}>{fmt(totaux.normal)}</div>
          <div style={{ fontSize:11, opacity:.7, marginTop:4 }}>Travaux + MOE ({Math.round(totaux.moePct*100)}%)</div>
        </div>
        <div style={{ background:"linear-gradient(135deg,#d97706,#f59e0b)", borderRadius:14, padding:"18px 22px", color:"#fff" }}>
          <div style={{ fontSize:11, opacity:.8, marginBottom:4 }}>⚠ Estimation haute (+{Math.round(totaux.impPct*100)}%)</div>
          <div style={{ fontSize:26, fontWeight:800 }}>{fmt(totaux.haut)}</div>
          <div style={{ fontSize:11, opacity:.7, marginTop:4 }}>Imprévus inclus</div>
        </div>
      </div>

      {/* Décomposition */}
      <Card>
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:10 }}>
          {[["Fournitures",totaux.tF],["Main d'œuvre",totaux.tMO],["Honoraires MOE",totaux.moe]].map(([l,v]) => (
            <div key={l} style={{ background:"#f8fafc", borderRadius:8, padding:"10px 14px" }}>
              <div style={{ fontSize:11, color:"#64748b" }}>{l}</div>
              <div style={{ fontSize:16, fontWeight:700 }}>{fmt(v)}</div>
            </div>
          ))}
        </div>
      </Card>

      {/* Détail */}
      {actives.length === 0
        ? <Card><div style={{ textAlign:"center", padding:"32px 0", color:"#94a3b8" }}>
            <div style={{ fontSize:36, marginBottom:10 }}>🔨</div>
            <div>Aucun poste saisi. Allez dans <b>Travaux</b> pour saisir les quantités.</div>
          </div></Card>
        : PIECES_ORDRE.filter(pn => byPiece[pn]).map(pn => {
            const lignes = byPiece[pn];
            const pTotal = lignes.reduce((s,p) => s + calcLigne(p,qty,ov,nbP,effParams).f + calcLigne(p,qty,ov,nbP,effParams).mo, 0);
            return (
              <div key={pn} style={{ background:"#fff", borderRadius:12, border:"1px solid #e2e8f0", marginBottom:8, overflow:"hidden" }}>
                <div style={{ padding:"10px 18px", background:"#f8fafc", display:"flex", alignItems:"center", gap:8 }}>
                  <span>{PIECES_ICONES[pn]||"📦"}</span>
                  <span style={{ fontWeight:700, fontSize:13, flex:1 }}>{pn}</span>
                  <span style={{ fontSize:14, fontWeight:700, color:"#1d4ed8" }}>{fmt(pTotal)}</span>
                </div>
                <div style={{ overflowX:"auto" }}>
                  <table style={{ width:"100%", borderCollapse:"collapse", fontSize:12 }}>
                    <thead><tr>{["Fourniture","Poste","Fournisseur","Réf.","Qté","Fournitures","MO","Total HT"].map(h =>
                      <th key={h} style={{ padding:"5px 10px", textAlign:"left", fontWeight:600, color:"#64748b", fontSize:10, background:"#fafafa", whiteSpace:"nowrap" }}>{h}</th>
                    )}</tr></thead>
                    <tbody>
                      {lignes.map(p => {
                        const ep = effParams.find(x=>x.id===p.id)||p;
                        const r = calcLigne(p, qty, ov, nbP, effParams);
                        return (
                          <tr key={KEY(p)} style={{ borderTop:"1px solid #f1f5f9" }}>
                            <td style={{ padding:"5px 10px", fontWeight:500 }}>{p.fourniture}</td>

      {/* Actions */}

        <Btn onClick={onExportCSV} style={{ flex:1 }}>📊 Excel / CSV</Btn>
        <Btn onClick={onExportPDF} style={{ flex:1 }}>📄 Imprimer / PDF</Btn>
      </div>
    </div>
  );
}

// ─── APP PRINCIPALE ──────────────────────────────────────────────────────────
function App() {
  const [tab, setTab] = React.useState("projets");
  const [params, setParams] = React.useState(() => store.get(SK, PARAMETRES_BASE));
  const [qty, setQtyState] = React.useState({});
  const [ov, setOvState] = React.useState({});
  const [nbP, setNbPState] = React.useState({});
  const [fiche, setFicheState] = React.useState({...FICHE_VIDE});
  const [visites, setVisites] = React.useState(() => store.get(VK, []));
  const [projetId, setProjetId] = React.useState(null);
  const [toast, setToast] = React.useState("");

  const showToast = msg => { setToast(msg); setTimeout(() => setToast(""), 3000); };

  // Setters atomiques
  const setQty = (k, v) => setQtyState(m => ({...m, [k]: v}));
  const setOv = (k, field, v) => setOvState(m => ({...m, [k]: {...m[k], [field]: v}}));
  const setNbP = (pn, v) => setNbPState(m => ({...m, [pn]: v}));
  const updateFiche = (k, v) => setFicheState(f => ({...f, [k]: v}));
  const toggleFiche = (k, v) => setFicheState(f => ({...f, [k]: Array.isArray(f[k]) ? (f[k].includes(v) ? f[k].filter(x=>x!==v) : [...f[k],v]) : [v]}));

  // Paramètres effectifs (avec overrides projet)
  const effParams = React.useMemo(() =>
    params.map(p => {
      const o = ov[KEY(p)];
      return {...p, coutHT: o?.cout ?? p.coutHT, moHT: o?.mo ?? p.moHT};
    }),
    [params, ov]
  );

  const totaux = React.useMemo(() => calcTotaux(params, qty, ov, nbP, effParams), [params, qty, ov, nbP, effParams]);

  const pList = React.useMemo(() => {
    const g = {};
    params.forEach(p => {
      if (!g[p.piece]) g[p.piece] = {};
      if (!g[p.piece][p.poste]) g[p.piece][p.poste] = [];
      g[p.piece][p.poste].push(p);
    });
    return g;
  }, [params]);

  // Actions projets
  const nouveauProjet = () => {

        {tab==="visite"    && <VisiteTab fiche={fiche} onUpdate={updateFiche} onToggle={toggleFiche}/>}
        {tab==="travaux"   && <TravauxTab params={params} pList={pList} qty={qty} setQty={setQty} ov={ov} setOv={setOv} nbP={nbP} setNbP={setNbP} effParams={effParams} totaux={totaux}/>}
        {tab==="resultats" && <ResultatsTab params={params} qty={qty} ov={ov} nbP={nbP} effParams={effParams} totaux={totaux} fiche={fiche} onSave={sauvegarder} onExportCSV={exportCSV} onExportPDF={exportPDF}/>}
